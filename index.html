<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="5;url=https://zracross.my.canva.site" />
  <title>ZRACROSS Redirect</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      height:100vh;
      overflow:hidden;
      font-family:Arial,sans-serif;
      background:linear-gradient(135deg,#000000,#111827,#000000);
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
    }
    .bg span{
      position:absolute;
      width:6px;height:6px;border-radius:50%;background:white;
      opacity:.35;animation:float 12s linear infinite;
    }
    @keyframes float{
      from{transform:translateY(100vh) scale(0)}
      to{transform:translateY(-10vh) scale(1.8)}
    }
    .card{
      position:relative;
      z-index:2;
      width:90%;max-width:520px;
      padding:40px;
      border:1px solid rgba(255,255,255,.15);
      border-radius:24px;
      backdrop-filter:blur(16px);
      background:rgba(255,255,255,.06);
      text-align:center;
      box-shadow:0 20px 60px rgba(0,0,0,.5);
      animation:pop .8s ease;
    }
    @keyframes pop{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
    h1{font-size:48px;letter-spacing:4px;margin-bottom:12px}
    p{font-size:18px;opacity:.9;margin-bottom:24px}
    .loader{
      width:80px;height:80px;border:4px solid rgba(255,255,255,.15);
      border-top:4px solid white;border-radius:50%;margin:0 auto 20px;
      animation:spin 1s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    .btn{
      display:inline-block;padding:14px 22px;background:white;color:black;
      text-decoration:none;border-radius:14px;font-weight:bold;
    }
    .small{margin-top:16px;font-size:13px;opacity:.7}
  </style>
</head>
<body>
  <div class="bg">
    <span style="left:10%;animation-delay:0s"></span>
    <span style="left:20%;animation-delay:2s"></span>
    <span style="left:35%;animation-delay:4s"></span>
    <span style="left:50%;animation-delay:1s"></span>
    <span style="left:65%;animation-delay:3s"></span>
    <span style="left:80%;animation-delay:5s"></span>
    <span style="left:90%;animation-delay:6s"></span>
  </div>
  <div class="card">
    <div class="loader"></div>
    <h1>ZRACROSS</h1>
    <p>Redirecting you to our official website...</p>
    <a class="btn" href="https://zracross.my.canva.site">Enter Now</a>
    <div class="small">Automatic redirect in 5 seconds</div>
  </div>
</body>
</html>
